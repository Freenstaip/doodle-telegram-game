<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>DOODLE CRASH DEMO</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main id="app">
    <canvas id="game" aria-label="DOODLE CRASH DEMO"></canvas>
    <div id="start" class="overlay">
      <div class="card">
        <h1>DOODLE CRASH DEMO</h1>
        <p>Tap left/right on your phone screen to jump on platforms.</p>
        <button id="play">PLAY</button>
      </div>
    </div>
    <div id="gameover" class="overlay hidden">
      <div class="card">
        <h1>GAME OVER</h1>
        <p id="finalScore">Score 0</p>
        <button id="again">AGAIN</button>
      </div>
    </div>
    <div id="registerGate" class="overlay hidden">
      <div class="card">
        <h1 id="gateTitle">Your progress has been saved.</h1>
        <p id="gateText">To continue the game:<br>✅ Register on the website<br>✅ Find in search <strong>Doodle Crash</strong><br>✅ Continue playing without restrictions<br><br><span class="game-search-label">🔎 Game name to search:</span><span class="game-search-row"><strong>DOODLE CRASH</strong><button type="button" id="copyGameName" class="copy-game-name">📋 Copy</button></span><span id="copyGameNameStatus" class="copy-game-name-status"></span></p>
        <button id="registerBtn">Continue on the website</button>
      </div>
    </div>
  </main>
  <script src="./game.js"></script>
</body>
</html>
