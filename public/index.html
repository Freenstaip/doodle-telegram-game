<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Notebook Jump</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main id="app">
    <canvas id="game" aria-label="Notebook Jump game"></canvas>
    <div id="start" class="overlay">
      <div class="card">
        <h1>NOTEBOOK JUMP</h1>
        <p>Тапай, чтобы прыгать. Наклоняй телефон или веди пальцем влево/вправо.</p>
        <button id="play">PLAY</button>
      </div>
    </div>
    <div id="gameover" class="overlay hidden">
      <div class="card">
        <h1>GAME OVER</h1>
        <p id="finalScore">Score 0</p>
        <button id="again">AGAIN</button>
      </div>
    </div>
    <div id="registerGate" class="overlay hidden">
      <div class="card">
        <h1 id="gateTitle">Ваш прогресс сохранён</h1>
        <p id="gateText">Чтобы продолжить игру:<br>✅ Зарегистрируйтесь на сайте<br>✅ В поиске найдите <strong>Doodle Crash</strong><br>✅ Продолжите игру без ограничений<br><br>🔎 Название игры для поиска:<br><strong>DOODLE CRASH</strong></p>
        <button id="registerBtn">Продолжить на сайте</button>
      </div>
    </div>
  </main>
  <script src="./game.js"></script>
</body>
</html>
