name = "doodle-telegram-game"
main = "src/worker.js"
compatibility_date = "2026-06-05"

[assets]
directory = "./public"
binding = "ASSETS"


[[d1_databases]]
binding = "DB"
database_name = "doodle-telegram-game-db"
database_id = "62f1646f-cbf1-40a6-9e36-2e93b615ba5e"

[vars]
# ID админов через запятую. Узнать свой ID можно у @userinfobot.
ADMIN_IDS = "5947697192"
# Финальная ссылка 1win/лендинга. В неё будет добавлен sub1=<telegram_id>.
OFFER_URL = "https://one-vv1673.com/casino/play/v_barbarabang:doodlecrash/?p=qz4h"
OFFER_SUBID_PARAM = "sub1"
# Любая секретная строка для webhook Telegram и postback 1win.
BOT_WEBHOOK_SECRET = "jumper101"
POSTBACK_SECRET = "poster2"
# Можно оставить пустым: Worker сам возьмёт домен из запроса.
PUBLIC_BASE_URL = ""
